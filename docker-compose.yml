services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cinephix-api
    restart: unless-stopped
    ports:
      # Host:container — uvicorn escucha en 8000 dentro de la imagen (ver Dockerfile).
      # Por defecto publicamos en el host 8001; cambia API_HOST_PORT en .env si hace falta.
      - "${API_HOST_PORT:-8001}:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/cinephix
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - TMDB_API_KEY=${TMDB_API_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - EMAIL_FROM=noreply@cinephix.com
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - TRAKT_CLIENT_ID=${TRAKT_CLIENT_ID}
      - TRAKT_CLIENT_SECRET=${TRAKT_CLIENT_SECRET}
      - TRAKT_REDIRECT_URI=${TRAKT_REDIRECT_URI:-http://localhost:8000/integrations/trakt/callback}
    depends_on:
      - postgres
      - redis
    networks:
      - cinephix-network

  postgres:
    image: postgres:16-alpine
    container_name: cinephix-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=cinephix
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts:/scripts:ro
    entrypoint: ["/bin/bash", "/scripts/entrypoint.sh"]
    command: ["postgres"]
    ports:
      - "5432:5432"
    networks:
      - cinephix-network

  redis:
    image: redis:7-alpine
    container_name: cinephix-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - cinephix-network

volumes:
  postgres_data:
  redis_data:

# Creada por el compose del frontend (u otra stack) con name: cinephix-network.
# Si aún no existe: docker network create cinephix-network
networks:
  cinephix-network:
    external: true